events {
    worker_connections 1024;
}

http {
    # ── Rate Limiting ────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=graphql_strict:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=analytics_limit:10m rate=5r/s;
    limit_conn_zone $binary_remote_addr zone=ws_conn:10m;

    upstream spring_backend {
        server backend:8060;
    }

    upstream fastapi_backend {
        server analytics-engine:8000;
    }

    upstream nextjs_frontend {
        server frontend:3000;
    }

    # ── Redirect HTTP to HTTPS (uncomment when SSL certs are ready) ──────────
    # server {
    #     listen 80;
    #     server_name _;
    #     return 301 https://$host$request_uri;
    # }

    server {
        listen 80;
        # listen 443 ssl http2;   # Uncomment when SSL certs are ready

        # ── SSL Configuration (uncomment when certs are ready) ───────────────
        # ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        # ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        # ssl_protocols       TLSv1.2 TLSv1.3;
        # ssl_ciphers         HIGH:!aNULL:!MD5;
        # ssl_prefer_server_ciphers on;
        # ssl_session_cache   shared:SSL:10m;
        # ssl_session_timeout 10m;

        # ── Security Headers ─────────────────────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Hide server version
        server_tokens off;

        # ── Request size limits ──────────────────────────────────────────────
        client_max_body_size 2m;

        # ── GraphQL API ──────────────────────────────────────────────────────
        location /graphql {
            limit_req zone=graphql_strict burst=20 nodelay;
            limit_req_status 429;
            proxy_pass http://spring_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── GraphiQL — blocked in production by default ──────────────────────
        # Access is controlled via GRAPHIQL_ENABLED env var in Spring.
        # To also block at Nginx level in production, uncomment:
        # location /graphiql {
        #     return 403;
        # }
        location /graphiql {
            proxy_pass http://spring_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── WebSocket ────────────────────────────────────────────────────────
        location /ws {
            limit_conn ws_conn 5;
            proxy_pass http://spring_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }

        # ── FastAPI analytics engine ─────────────────────────────────────────
        location /api/v1/ {
            limit_req zone=analytics_limit burst=5 nodelay;
            limit_req_status 429;
            proxy_pass http://fastapi_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Next.js frontend (default) ───────────────────────────────────────
        location / {
            proxy_pass http://nextjs_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Next.js HMR WebSocket (dev only) ─────────────────────────────────
        location /_next/webpack-hmr {
            proxy_pass http://nextjs_frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
